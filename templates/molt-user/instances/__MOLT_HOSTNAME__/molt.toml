# molt.toml — Stack manifest for __MOLT_HOSTNAME__
# Personal config repo: __MOLT_GITHUB__/molt-__MOLT_USER__

[stack]
name = "molt-__MOLT_USER__"
version = "0.1.0"
user_repo = "molt-__MOLT_USER__"

[sleeve]
hostname = "__MOLT_HOSTNAME__"
instance_dir = "instances/__MOLT_HOSTNAME__"
projects_dir = "~/Devel/prj"

# Enabled out of the box: the liberators that need no extra config beyond
# what this skeleton ships. Enable the rest as you add config/<name>/.

[[liberator]]
name = "system"
enabled = true
os = ["linux", "macos"]

[[liberator]]
name = "local-bin"
enabled = true
os = ["linux", "macos"]
depends = ["system"]

[[liberator]]
name = "git"
enabled = true
os = ["linux", "macos"]

[[liberator]]
name = "ssh"
enabled = true
os = ["linux", "macos"]

# --- Enable as you add the matching config/ directories ---

[[liberator]]
name = "zsh"
enabled = false
os = ["linux", "macos"]
depends = ["system"]

[[liberator]]
name = "tmux"
enabled = false
os = ["linux", "macos"]

[[liberator]]
name = "editors"
enabled = false
os = ["linux", "macos"]
depends = ["zsh", "git"]

[[liberator]]
name = "iterm2"
enabled = false
os = ["macos"]

[[liberator]]
name = "vscode"
enabled = false
os = ["linux", "macos"]
depends = ["zsh"]

[[liberator]]
name = "dev-tools"
enabled = false
os = ["linux", "macos"]
depends = ["zsh"]

[[liberator]]
name = "brew"
enabled = false
os = ["macos"]
depends = ["system"]
