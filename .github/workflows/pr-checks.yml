name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-documentation:
    name: Documentation Checks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check for documentation updates
      run: |
        echo "Checking if documentation needs updates..."
        if git diff --name-only origin/main..HEAD | grep -qE "(bin/|lib/|liberators/)"; then
          echo "Scripts were modified - checking for documentation updates"
          if git diff --name-only origin/main..HEAD | grep -qE "\.md$"; then
            echo "Documentation updates found"
          else
            echo "Warning: Scripts modified but no documentation updates found"
            echo "Consider updating relevant documentation"
          fi
        fi

  commit-message-check:
    name: Commit Message Format
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check commit messages
      run: |
        echo "Checking commit message format..."
        git log --format="%s" origin/main..HEAD | while read -r commit; do
          echo "Checking: $commit"
          if [ ${#commit} -lt 10 ]; then
            echo "  Warning: Very short commit message"
          fi
          if [ ${#commit} -gt 72 ]; then
            echo "  Warning: Commit message exceeds 72 characters"
          fi
        done
        echo "Commit message check completed"

  pr-size-check:
    name: PR Size Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check PR size
      run: |
        ADDITIONS="${{ github.event.pull_request.additions }}"
        DELETIONS="${{ github.event.pull_request.deletions }}"
        TOTAL_CHANGES=$((ADDITIONS + DELETIONS))
        echo "Lines added: $ADDITIONS"
        echo "Lines deleted: $DELETIONS"
        echo "Total changes: $TOTAL_CHANGES"
        if [ $TOTAL_CHANGES -gt 1000 ]; then
          echo "Warning: Large PR (>1000 lines changed)"
          echo "Consider breaking this into smaller PRs"
        elif [ $TOTAL_CHANGES -gt 500 ]; then
          echo "Note: Medium-sized PR (>500 lines changed)"
        else
          echo "PR size is reasonable"
        fi
