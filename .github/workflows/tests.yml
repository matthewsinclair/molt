name: Molt Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-linux:
    name: Test on Ubuntu
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install bats-core
      run: |
        wget https://github.com/bats-core/bats-core/archive/v1.12.0.tar.gz
        tar -xzf v1.12.0.tar.gz
        cd bats-core-1.12.0
        sudo ./install.sh /usr/local
        echo "PATH=/usr/local/bin:$PATH" >> $GITHUB_ENV
        bats --version

    - name: Configure git identity for tests
      run: |
        git config --global user.email "ci@test.local"
        git config --global user.name "CI"

    - name: Make scripts executable
      run: |
        chmod +x bin/*
        chmod +x liberators/*.sh

    - name: Run tests
      run: |
        bats test/*.bats test/liberators/*.bats

  test-macos:
    name: Test on macOS
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install bats-core
      run: |
        brew install bats-core
        echo "PATH=$PATH:/usr/local/bin:/opt/homebrew/bin" >> $GITHUB_ENV
        bats --version

    - name: Configure git identity for tests
      run: |
        git config --global user.email "ci@test.local"
        git config --global user.name "CI"

    - name: Make scripts executable
      run: |
        chmod +x bin/*
        chmod +x liberators/*.sh

    - name: Run tests
      run: |
        bats test/*.bats test/liberators/*.bats

  shellcheck:
    name: Shell Script Analysis
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run ShellCheck
      run: |
        echo "Running ShellCheck on Molt scripts..."
        shellcheck -x bin/molt
        for script in lib/*.sh; do
          shellcheck -x "$script"
        done
        for script in liberators/*.sh; do
          shellcheck -x "$script"
        done
        echo "ShellCheck: all clean"

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-linux, test-macos]
    if: always()

    steps:
    - name: Summary
      run: |
        echo "## Test Summary"
        echo "All test jobs have completed."
        if [ "${{ needs.test-linux.result }}" == "success" ] && [ "${{ needs.test-macos.result }}" == "success" ]; then
          echo "All tests passed!"
        else
          echo "Some tests failed. Please review the logs."
          exit 1
        fi
